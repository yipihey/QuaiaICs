# MUSIC configuration — uni-grid run on the Quaia-constrained white noise.
#
#   1.  julia ../examples/make_music_wnoise.jl quaia_icbox_phases.npz 1024 wnoise_music_1024.bin
#   2.  MUSIC music_unigrid.conf            # → ic_quaia_1024.gdt (Gadget-2)
#
# 2^levelmax must equal the resolution of the white-noise file (1024 → level 10). boxlength MUST match
# the carrier's boxsize (manifest.json: 13260 Mpc/h) so the constrained structure lands at the right
# physical scale. Output 'format' can be gadget2 / enzo / grafic / generic — see the MUSIC docs.

[setup]
boxlength        = 13260           # Mpc/h — must equal the carrier boxsize
zstart           = 49
levelmin         = 10              # 2^10 = 1024 base grid
levelmin_TF      = 10
levelmax         = 10              # uni-grid: levelmin == levelmax
padding          = 8
overlap          = 4
periodic_TF      = yes
baryons          = no
use_2LPT         = yes
use_LLA          = no
align_top        = no

[cosmology]
Omega_m          = 0.315
Omega_L          = 0.685
Omega_b          = 0.049
H0               = 67.4
sigma_8          = 0.81
nspec            = 0.965
transfer         = eisenstein      # or: transfer = camb_file / camb_filename = <CAMB Tk file>

[random]
generator        = MUSIC
seed[10]         = wnoise_music_1024.bin   # the Quaia-constrained white noise at level 10
grafic_sign      = yes             # use the field as-is (MUSIC otherwise negates on read); verify sign

[output]
format           = gadget2
filename         = ic_quaia_1024.gdt

[poisson]
fft_fine         = yes
accuracy         = 1e-5
pre_smooth       = 3
post_smooth      = 3
smoother         = gs
laplace_order    = 6
grad_order       = 6
