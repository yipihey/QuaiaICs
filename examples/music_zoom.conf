# MUSIC configuration — ZOOM-IN run seeded by the Quaia-constrained field.
#
# The natural way to zoom: hand MUSIC the *constrained coarse field* at the base level and let MUSIC's
# own multi-scale white-noise refinement (Hahn & Abel 2011 — the same construction QuaiaICs is built on)
# add the small-scale power inside your high-resolution region. The constrained Quaia modes then supply
# the correct large-scale tidal field around the zoom.
#
#   1.  julia ../examples/make_music_wnoise.jl quaia_icbox_phases.npz 256 wnoise_music_256.bin
#       (256^3 = level 8 = the constrained carrier field itself)
#   2.  pick the Lagrangian region to refine (ref_center / ref_extent, in units of the box, 0..1)
#   3.  MUSIC music_zoom.conf
#
# MUSIC refines levels 9..levelmax inside the region automatically; only the base level reads our file.

[setup]
boxlength        = 13260           # Mpc/h — must equal the carrier boxsize
zstart           = 49
levelmin         = 8               # 2^8 = 256 base grid = the Quaia-constrained coarse field
levelmin_TF      = 8
levelmax         = 12              # 2^12 = 4096 effective in the refined region
padding          = 8
overlap          = 4
# the high-resolution Lagrangian patch, as fractions of the box (here a 0.10-box cube near the centre,
# i.e. around the low-redshift / best-constrained part of the Quaia volume — adjust to your target):
ref_center       = 0.5, 0.5, 0.5
ref_extent       = 0.10, 0.10, 0.10
periodic_TF      = yes
baryons          = no
use_2LPT         = yes
align_top        = no

[cosmology]
Omega_m          = 0.315
Omega_L          = 0.685
Omega_b          = 0.049
H0               = 67.4
sigma_8          = 0.81
nspec            = 0.965
transfer         = eisenstein

[random]
generator        = MUSIC
seed[8]          = wnoise_music_256.bin    # constrained coarse field; MUSIC refines 9..12 in the region
# seeds for the refined levels are generated by MUSIC's white-noise refinement (leave unset), e.g.:
# seed[9]        = 0
# seed[10]       = 0
grafic_sign      = yes

[output]
format           = gadget2
filename         = ic_quaia_zoom.gdt

[poisson]
fft_fine         = yes
accuracy         = 1e-5
pre_smooth       = 3
post_smooth      = 3
smoother         = gs
laplace_order    = 6
grad_order       = 6
